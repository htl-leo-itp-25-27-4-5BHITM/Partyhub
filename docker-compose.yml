services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=demo
      - POSTGRES_USER=demo
      - POSTGRES_DB=demo
    networks:
      - partyhub-network

  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - 8180:8080
    volumes:
      - ./keycloak/partyhub-realm.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes/partyhub:/opt/keycloak/themes/partyhub:ro
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KEYCLOAK_IMPORT=/opt/keycloak/partyhub-realm.json
    networks:
      - partyhub-network

volumes:
  postgres:

networks:
  partyhub-network:
    driver: bridge
