name: Test
on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - '.github/workflows/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose Action
        uses: hoverkraft-tech/compose-action@v2.5.0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Start PostgreSQL Database
        run: docker compose up -d

      - name: Wait for database to be ready
        run: |
          until docker compose -f docker-compose.yml exec postgres pg_isready; do
            echo "Waiting for database to be ready..."
            sleep 1
          done

      - name: Build with Maven
        run: mvn -B test
      - name: Start Quarkus in dev mode
        run: |
          mvn quarkus:dev -Dquarkus.http.host=0.0.0.0 -Dquarkus.http.port=8080 &
          echo "Waiting for Quarkus to start..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/q/health > /dev/null 2>&1; then
              echo "Quarkus is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "Quarkus failed to start"
          exit 1 

      - name: Install npm dependencies
        uses: bahmutov/npm-install@v1
        with:
          working-directory: api

      - name: api tests
        run: npm t
        working-directory: api