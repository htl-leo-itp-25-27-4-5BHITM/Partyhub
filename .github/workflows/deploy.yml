# https://coresynapseai.com/2025/08/09/automating-kubernetes-deployments-with-github-actions/
name: Deploy
on:
  workflow_run:
    workflows: ["Build and Push"]
    types:
      - completed
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy PostgreSQL
        run: |
          echo "Ensuring postgres is running..."
          kubectl apply -f k8s/postgres.yaml
          echo "Waiting for postgres pod to be Ready..."
          kubectl wait --for=condition=Ready pod -l app=postgres --timeout=180s

      - name: Deploy Services
        run: |
          echo "Applying Kubernetes manifests"
          kubectl delete deployment quarkus --ignore-not-found=true
          kubectl delete service quarkus --ignore-not-found=true
          kubectl apply -f k8s/quarkus.yaml
          kubectl delete deployment keycloak --ignore-not-found=true
          kubectl delete service keycloak --ignore-not-found=true
          kubectl apply -f k8s/keycloak.yaml
          echo "Deployment successful."

      - name: Update Keycloak Realm
        run: |
          echo "Waiting for Keycloak pod to be running..."
          kubectl wait --for=condition=Ready pod -l app=keycloak --timeout=180s
          KC_POD=$(kubectl get pods -l app=keycloak -o jsonpath="{.items[0].metadata.name}")
          echo "Waiting for Keycloak server to respond..."
          for i in $(seq 1 30); do
            if kubectl exec "$KC_POD" -- curl -sf http://localhost:8080/realms/master > /dev/null 2>&1; then
              echo "Keycloak is responding."
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "Updating realm via $KC_POD..."
          kubectl exec "$KC_POD" -- /opt/keycloak/bin/kcadm.sh config credentials \
            --server http://localhost:8080 \
            --realm master \
            --user admin --password admin
          kubectl exec "$KC_POD" -- /opt/keycloak/bin/kcadm.sh update realms/partyhub \
            -f /opt/keycloak/data/import/realm-staging.json || true
          echo "Realm update complete."

      - name: Reset Database
        run: |
          POD=$(kubectl get pods -l app=postgres -o jsonpath="{.items[0].metadata.name}")
          echo "Resetting database via $POD..."
          kubectl cp src/main/resources/import.sql $POD:/tmp/import.sql
          kubectl exec $POD -- psql -U demo -d demo -f /tmp/import.sql
          echo "Database reset successful."
