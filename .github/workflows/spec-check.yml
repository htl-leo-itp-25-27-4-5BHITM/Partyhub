name: Spec Check

on:
  push:
    paths:
      - 'openspec/**'
      - 'SPECIFICATION.md'

jobs:
  spec-exists:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPECIFICATION.md exists
        run: |
          if [ ! -f SPECIFICATION.md ]; then
            echo "SPECIFICATION.md is missing"; exit 1; fi
      - name: Check core specs exist
        run: |
          missing=0
          for f in \
            openspec/changes/comprehensive-spec/proposal.md \
            openspec/changes/comprehensive-spec/design.md \
            openspec/changes/comprehensive-spec/tasks.md; do
            if [ ! -f "$f" ]; then echo "Missing $f"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
