quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=false

quarkus.http.test-port=8082

quarkus.oidc.enabled=false

quarkus.http.auth.permission.unauthenticated.policy=permit
quarkus.http.auth.permission.unauthenticated.paths=/*
