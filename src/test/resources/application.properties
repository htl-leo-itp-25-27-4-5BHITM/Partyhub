# Test database (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=

# Test schema
quarkus.hibernate-orm.sql-load-script = import.sql
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=false

# HTTP test port
quarkus.http.test-port=8082

# JWT Configuration for tests (without Keycloak container)
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.public.key.location=classpath:publicKey.pem

# Disable Keycloak DevServices for tests (requires Docker)
quarkus.keycloak.devservices.enabled=false

# OIDC disabled but JWT enabled for token validation
quarkus.oidc.enabled=false
quarkus.oidc.client-id=partyhub-backend
