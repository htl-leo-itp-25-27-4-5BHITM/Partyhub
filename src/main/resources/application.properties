quarkus.datasource.db-kind=postgresql
quarkus.http.port=8080

# =====================
# Auth Bypass (dev/staging only)
# =====================
partyhub.auth.bypass-enabled=${PARTYHUB_AUTH_BYPASS_ENABLED:false}

# =====================
# Keycloak / JWT
# =====================
partyhub.keycloak.issuer=${KEYCLOAK_ISSUER:http://localhost:8000/realms/partyhub}
mp.jwt.verify.issuer=${partyhub.keycloak.issuer}
mp.jwt.verify.publickey.location=${partyhub.keycloak.issuer}/protocol/openid-connect/certs
smallrye.jwt.path.groups=realm_access/roles

# =====================
# DEV (local)
# =====================
%dev.partyhub.auth.bypass-enabled=true
%dev.quarkus.http.host=localhost
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/demo
%dev.quarkus.datasource.username=demo
%dev.quarkus.datasource.password=demo
# Disabling Dev Services because you are using a local Postgres instance
%dev.quarkus.devservices.enabled=false

# =====================
# STAGING
# =====================
%staging.partyhub.auth.bypass-enabled=true
%staging.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%staging.quarkus.datasource.username=demo
%staging.quarkus.datasource.password=demo
%staging.quarkus.mailer.mock=false

# =====================
# PROD (Docker / Server)
# =====================
# Ensure the hostname 'postgres' matches your Docker Compose service name
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%prod.quarkus.datasource.username=demo
%prod.quarkus.datasource.password=demo

# =====================
# Hibernate ORM
# =====================
quarkus.hibernate-orm.database.default-schema=public

# Changed from 'drop-and-create' to 'update'
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# =====================
# Quarkus Mailer
# =====================
partyhub.notifications.email.from=noreply.partyhub@gmail.com
quarkus.mailer.mock=false
quarkus.mailer.host=${SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${SMTP_PORT:587}
quarkus.mailer.username=${SMTP_USER:noreply.partyhub@gmail.com}
quarkus.mailer.password=${SMTP_PASSWORD:}
quarkus.mailer.auth-methods="DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN"
quarkus.mailer.login=REQUIRED
quarkus.mailer.start-tls=REQUIRED

%dev.quarkus.mailer.mock=false

%staging.quarkus.mailer.mock=false
%staging.quarkus.mailer.host=${SMTP_HOST:smtp.example.com}
%staging.quarkus.mailer.port=${SMTP_PORT:587}
%staging.quarkus.mailer.username=${SMTP_USER:}
%staging.quarkus.mailer.password=${SMTP_PASSWORD:}
# =====================
# Profile Picture Upload
# =====================
%dev.partyhub.profile-picture.upload-dir=uploads/profiles
%prod.partyhub.profile-picture.upload-dir=/app/uploads/profiles
