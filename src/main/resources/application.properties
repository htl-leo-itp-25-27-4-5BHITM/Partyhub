quarkus.datasource.db-kind=postgresql
quarkus.http.port=8080

# =====================
# Keycloak / JWT
# =====================
mp.jwt.verify.issuer=http://localhost:8000/realms/partyhub
mp.jwt.verify.publickey.location=http://localhost:8000/realms/partyhub/protocol/openid-connect/certs
smallrye.jwt.path.groups=realm_access/roles

# =====================
# DEV (local)
# =====================
%dev.quarkus.http.host=localhost
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/demo
%dev.quarkus.datasource.username=demo
%dev.quarkus.datasource.password=demo
# Disabling Dev Services because you are using a local Postgres instance
%dev.quarkus.devservices.enabled=false

# =====================
# PROD (Docker / Server)
# =====================
# Ensure the hostname 'postgres' matches your Docker Compose service name
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%prod.quarkus.datasource.username=demo
%prod.quarkus.datasource.password=demo

# =====================
# Hibernate ORM
# =====================
quarkus.hibernate-orm.database.default-schema=public

# Changed from 'drop-and-create' to 'update'
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# =====================
# Out-of-app notifications
# =====================
# Sends an email for every in-app notification when the recipient has an email address.
partyhub.notifications.email.enabled=${PARTYHUB_NOTIFICATIONS_EMAIL_ENABLED:true}
partyhub.notifications.email.from=${PARTYHUB_NOTIFICATIONS_EMAIL_FROM:onboarding@resend.dev}
partyhub.notifications.resend.api-key=${PARTYHUB_NOTIFICATIONS_RESEND_API_KEY:re_4yUeTiuq_Ka9KdGRGm8AyUhVeTYnNy4uP}

%dev.partyhub.notifications.sms.enabled=true
