quarkus.datasource.db-kind=postgresql
quarkus.http.port=8080

# =====================
# DEV (local)
# =====================
%dev.quarkus.http.host=localhost
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/demo
%dev.quarkus.datasource.username=demo
%dev.quarkus.datasource.password=demo
# Disabling Dev Services because you are using a local Postgres instance
%dev.quarkus.devservices.enabled=false

# =====================
# PROD (Docker / Server)
# =====================
# Ensure the hostname 'postgres' matches your Docker Compose service name
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%prod.quarkus.datasource.username=demo
%prod.quarkus.datasource.password=demo

# =====================
# Hibernate ORM
# =====================
quarkus.hibernate-orm.database.default-schema=public

# Changed from 'drop-and-create' to 'update'
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

