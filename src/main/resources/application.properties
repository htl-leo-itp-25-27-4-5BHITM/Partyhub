# JDBC
quarkus.package.jar.type=uber-jar

quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
quarkus.datasource.username=demo
quarkus.datasource.password=demo
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%prod.quarkus.datasource.username=demo
%prod.quarkus.datasource.password=demo

# Hibernate
quarkus.hibernate-orm.database.default-schema=public
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.sql-load-script = import.sql
%prod.quarkus.hibernate-orm.schema-management.strategy=update

# OIDC / Keycloak - Dev mode uses docker-compose Keycloak
%dev.quarkus.keycloak.devservices.enabled=false
%dev.quarkus.oidc.auth-server-url=http://localhost:8180/realms/partyhub

# Keycloak DevServices for non-dev profiles (when Docker available)
quarkus.keycloak.devservices.enabled=true
quarkus.keycloak.devservices.keycloak-version=24.0.0

# Import realm from JSON file
quarkus.keycloak.devservices.keycloak-container-env=KEYCLOAK_ADMIN=admin,KEYCLOAK_ADMIN_PASSWORD=admin

# OIDC configuration
quarkus.oidc.client-id=partyhub-backend
quarkus.oidc.credentials.secret=secret
%prod.quarkus.oidc.auth-server-url=https://keycloak:8443/realms/partyhub
%prod.quarkus.oidc.tls.verification=certificate

# Disable authentication for swagger/dev UIs only (require auth for API)
quarkus.http.auth.permission.public.paths=/q/dev-ui,/q/swagger-ui,/q/openapi
quarkus.http.auth.permission.public.methods=GET
quarkus.http.auth.permission.public.policy=permit
