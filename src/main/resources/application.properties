quarkus.package.jar.type=uber-jar

quarkus.datasource.db-kind=postgresql

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
quarkus.datasource.username=demo
quarkus.datasource.password=demo
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/demo
%prod.quarkus.datasource.username=demo
%prod.quarkus.datasource.password=demo

quarkus.hibernate-orm.database.default-schema=public
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%prod.quarkus.hibernate-orm.schema-management.strategy=none
%prod.quarkus.hibernate-orm.sql-load-script = import.sql

# Keycloak OIDC Configuration
# Use localhost:8180 when running PartyHub locally
# Use keycloak:8080 when running PartyHub in Docker container
quarkus.oidc.auth-server-url=http://localhost:8180/realms/party-realm
quarkus.oidc.client-id=party-client
quarkus.oidc.credentials.client-secret.value=secret123
quarkus.oidc.token.authorization-scheme=Bearer
quarkus.oidc.token.verify-aud=false

%prod.quarkus.oidc.auth-server-url=http://keycloak:8080/realms/party-realm

# Secured endpoints - exclude public endpoints
quarkus.http.auth.permission.authenticated.paths=/api/parties,/api/users,/follow
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public.paths=/api/users/*/profile-picture*,/q/swagger-ui*,/q/openapi*
quarkus.http.auth.permission.public.policy=permit

