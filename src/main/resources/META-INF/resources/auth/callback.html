<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing in - PartyHub</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1040" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyHub" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="stylesheet" href="../global.css" />
    <script src="../auth-service.js" defer></script>
  </head>
  <body>
    <main style="min-height: 100vh; display: grid; place-items: center; padding: 24px;">
      <p id="status">Completing sign-in...</p>
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        try {
          await window.authService.handleCallback();
        } catch (error) {
          console.error(error);
          document.getElementById("status").textContent =
            "Sign-in failed. Please return to PartyHub and try again.";
        }
      });
    </script>
  </body>
</html>
