<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Party</title>
    <link rel="stylesheet" href="./addParty.css" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../index.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css"
    />
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script src="../user-utils.js" defer></script>
    <script src="../auth-service.js" defer></script>
    <script src="../route-guard.js" defer></script>
    <script src="../nav.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
      defer
    ></script>
    <script src="./addParty.js?v=20260429-edit-load" defer></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        window.requireAuth?.();
      });
    </script>
  </head>
  <body>
    <main class="add-party-page">
      <section class="party-card">
        <div class="card-top">
          <span class="back-arrow">‹</span>
          <span class="step-title" id="stepTitle">Add new Party</span>
        </div>

        <form class="party-form">
          <div class="step active" data-step="1">
            <div class="field">
              <div class="field-label">Name</div>
              <input name="title" placeholder="Party Name" />
            </div>
            <div class="field">
              <div class="field-label">Description</div>
              <input name="description" placeholder="What is happening?" />
            </div>
            <div class="field">
              <div class="field-label">Start</div>
              <input
                id="time_start"
                name="time_start"
                placeholder="Start time"
              />
            </div>
            <div class="field">
              <div class="field-label">End</div>
              <input id="time_end" name="time_end" placeholder="End time" />
            </div>
            <div class="field">
              <div class="field-label">Address</div>
              <input id="location_address" name="location_address" />
              <div id="addressSuggestions" class="suggestions"></div>
            </div>
          </div>

          <div class="step" data-step="2">
            <div class="visibility-options">
              <button type="button" class="vis-card active" data-mode="private">
                🔒 Private
              </button>
              <button type="button" class="vis-card" data-mode="public">
                🔓 Public
              </button>
            </div>
            <div class="user-list" id="userList"></div>
            <p class="everyone-hint" id="everyoneHint" style="display: none">
              Visible to everyone.
            </p>
          </div>

          <div class="step" data-step="3">
            <div class="field">
              <div class="field-label">Entry fee (€)</div>
              <input name="entry_costs" type="number" />
            </div>
            <div class="field">
              <div class="field-label">Theme</div>
              <input name="theme" placeholder="90s, etc." />
            </div>
            <div class="field">
              <div class="field-label">Minimum age</div>
              <input name="min_age" type="number" value="18" />
            </div>
            <div class="field">
              <div class="field-label">Max. age</div>
              <input name="max_age" type="number" />
            </div>
            <div class="field">
              <div class="field-label">Website</div>
              <input name="website" type="url" placeholder="https://..." />
            </div>
          </div>

          <div class="step" data-step="4">
            <div class="field">
              <div class="field-label">Map Preview</div>
              <div
                id="addPartyMap"
                style="
                  width: 100%;
                  height: 320px;
                  border-radius: 8px;
                  margin-top: 10px;
                  display: none;
                "
              ></div>
              <p
                id="mapMessage"
                style="color: #999; text-align: center; padding: 20px"
              >
                Party will be shown on the map
              </p>
            </div>
          </div>

          <button type="button" class="submit-btn" id="continueBtn">
            Continue
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
