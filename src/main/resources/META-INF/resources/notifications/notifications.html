<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Notifications</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1040" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyHub" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="./notifications.css?v=20260603-status-toggle" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="../user-utils.js" defer></script>
    <script src="../auth-service.js" defer></script>
    <script src="../nav.js" defer></script>
    <script src="../backend-functions.js?v=20260429-notifications" defer></script>
    <script src="./notifications.js?v=20260603-invite-accept-fix-2" defer></script>
  </head>

  <body class="bg-light">
    <div class="app-shell">
      <main class="container py-4">
        <header class="page-header">
          <h1 class="page-title font-heading">Notifications</h1>
          <p class="page-subtitle font-body-text">Stay updated with your events</p>
        </header>

        <section class="notif-panel" aria-live="polite" aria-label="Notifications">
          <div class="notif-list" id="notifList"></div>

          <template id="notifTpl">
            <article class="notif-card" role="group" aria-label="Notification">
              <div class="notif-row">
                <div class="notif-avatar">
                  <a class="avatar-link" href="#" target="_blank" rel="noopener">
                    <img src="../images/default_profile-picture.svg" alt="Profile picture" />
                  </a>
                </div>

                <div class="notif-text">
                  <div class="notif-message">Message</div>
                  <div class="notif-time">just now</div>
                </div>

                <div class="notif-actions" aria-hidden="false">
                  <button
                    class="btn-view-party"
                    aria-label="View party details"
                    title="View party details"
                  >
                    <!-- info.circle SF Symbol -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
                      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                      <rect x="11" y="10" width="2" height="6" rx="1" fill="currentColor"/>
                      <rect x="11" y="7" width="2" height="2" rx="1" fill="currentColor"/>
                    </svg>
                  </button>

                  <button
                    class="btn-accept"
                    aria-label="Accept"
                    title="Accept"
                  >
                    <!-- checkmark.circle SF Symbol -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
                      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/>
                      <path d="M8 12.5l2.5 2.5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                  </button>

                  <button
                    class="btn-dismiss"
                    aria-label="Delete"
                    title="Delete"
                  >
                    <!-- trash SF Symbol (breiter) -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
                      <rect x="6.5" y="6" width="11" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                      <path d="M9.5 10v6M12 10v6M14.5 10v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                      <path d="M5 6h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                      <rect x="9" y="3" width="6" height="3" rx="1.5" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                  </button>
                </div>
              </div>
            </article>
          </template>
        </section>
      </main>

      <nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
        <a class="nav-btn" href="/index.html" aria-label="Home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3 6.5L8 4l7 2.5 6-2.5v11l-6 2.5L10 15 3 17.5v-11z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
              stroke-linecap="round"
            />
          </svg>
          <span class="nav-label">Home</span>
        </a>

        <a class="nav-btn" href="/listPartys/listPartys.html" aria-label="Parties">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect
              x="3"
              y="3"
              width="18"
              height="18"
              rx="3"
              stroke="currentColor"
              stroke-width="1.6"
            />
            <circle cx="8.5" cy="8.5" r="1.8" fill="currentColor" />
            <path
              d="M21 21l-6-6-5 5"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Parties</span>
        </a>

        <a class="nav-btn active" href="/notifications/notifications.html" aria-label="Inbox" aria-current="page">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 22a2.5 2.5 0 0 0 2.45-2H9.55A2.5 2.5 0 0 0 12 22z"
              fill="currentColor"
            />
            <path
              d="M18 8a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2V8z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Inbox</span>
        </a>

        <a class="nav-btn" href="/profile/profile.html" aria-label="Profile">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle
              cx="12"
              cy="8.5"
              r="3"
              stroke="currentColor"
              stroke-width="1.6"
            />
            <path
              d="M4 20a8 8 0 0 1 16 0"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Profile</span>
        </a>
      </nav>

      <div class="toast-container" id="toastContainer"></div>
      <div class="confirm-overlay" id="confirmOverlay" hidden>
        <div
          class="confirm-dialog"
          id="confirmDialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="confirmTitle"
          aria-describedby="confirmMessage"
        >
          <div class="confirm-icon" id="confirmIcon" aria-hidden="true"></div>
          <div class="confirm-copy">
            <h2 id="confirmTitle">Bestätigen</h2>
            <p id="confirmMessage">Willst du diese Aktion wirklich ausführen?</p>
          </div>
          <div class="confirm-actions">
            <button class="confirm-btn confirm-cancel" id="confirmCancelBtn" type="button">
              Abbrechen
            </button>
            <button class="confirm-btn confirm-danger" id="confirmConfirmBtn" type="button">
              Bestätigen
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
