<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="./profile.css" />
    <link rel="stylesheet" href="../index.css" />

    <script src="../user-utils.js" defer></script>
    <script src="../nav.js" defer></script>
    <script src="../backend-functions.js" defer></script>
    <script src="./profile.js" defer></script>
  </head>

  <body class="bg-light">
    <div class="app-shell">
      <main class="container">
        <div id="searchBar">
          <div class="searchBox">
            <span class="searchIcon" aria-hidden="true">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                focusable="false"
              >
                <path
                  d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
                  stroke="white"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M21 21l-4.35-4.35"
                  stroke="white"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>

            <div class="separator"></div>

            <input
              type="text"
              id="searchInput"
              placeholder="Search usernames..."
              aria-label="Search usernames"
            />
          </div>

          <div id="searchDropdown" class="hidden" role="listbox" aria-label="Search results">
            <div id="searchResults" class="search-results-list"></div>
          </div>
        </div>

        <div id="profileContainer">
          <div id="profilePicture">
            <img
              id="profileImg"
              src="/images/default_profile-picture.svg"
              alt="Profile Picture"
            />
          </div>

          <div id="username">
            <button
              id="usernameBtn"
              class="username-btn"
              aria-haspopup="true"
              aria-expanded="false"
              type="button"
            >
              <span id="distinctName" class="distinct-name">@partyMausViki</span>
            </button>

            <div id="usernameDropdown" class="dropdown hidden" role="menu" aria-label="All users">
              <div id="usernameList" class="dropdown-list"></div>
            </div>
          </div>

          <div id="profileDetails">
            <div id="followingCount" aria-label="Following count"></div>
            <div id="followersCount" aria-label="Followers count"></div>
            <div id="postsCount" aria-label="Posts count"></div>
          </div>

          <div id="actionButton">
            <button id="editAccounçtBtn" class="edit-account-btn">
              <a href="../editProfile/editProfile.html">Edit Account</a>
            </button>
          </div>

          <div id="profileTabs">
            <div class="tab-buttons">
              <button id="tabPartys" class="tab-btn" type="button" aria-label="Partys">
                <span class="tab-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M4.01207 15.7618L5.70156 10.6933C6.46758 8.39525 6.85059 7.24623 7.75684 7.03229C8.6631 6.81835 9.51953 7.67478 11.2324 9.38764L14.6114 12.7666C16.3242 14.4795 17.1807 15.3359 16.9667 16.2422C16.7528 17.1484 15.6038 17.5314 13.3057 18.2975L8.23724 19.987C5.47183 20.9088 4.08912 21.3697 3.35924 20.6398C2.62936 19.9099 3.09026 18.5272 4.01207 15.7618Z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      fill="none"
                    />
                  </svg>
                </span>
              </button>

              <button id="tabPosts" class="tab-btn active" type="button" aria-label="Beiträge">
                <span class="tab-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="2" fill="none" />
                    <line x1="8" y1="8" x2="16" y2="8" stroke="currentColor" stroke-width="2" />
                    <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" />
                    <line x1="8" y1="16" x2="12" y2="16" stroke="currentColor" stroke-width="2" />
                  </svg>
                </span>
              </button>

              <button id="tabFavorites" class="tab-btn" type="button" aria-label="Favoriten">
                <span class="tab-icon">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M12 21c-.6 0-1.2-.2-1.7-.6C6.1 17.1 2 13.36 2 9.5 2 6.42 4.42 4 7.5 4c1.74 0 3.41.81 4.5 2.09C13.09 4.81 14.76 4 16.5 4 19.58 4 22 6.42 22 9.5c0 3.86-4.1 7.6-8.3 10.9-.5.4-1.1.6-1.7.6z"
                      fill="currentColor"
                      stroke="currentColor"
                      stroke-width="1.5"
                    />
                  </svg>
                </span>
              </button>
            </div>

            <div class="tab-underline"></div>

            <div class="tab-content" style="background:none; box-shadow:none; border-radius:0; padding-top:18px;">
              <section id="tabContentPartys" class="tab-section" style="display:none;">
                <p class="muted no-parties">Keine Partys vorhanden</p>

                <template id="party-template">
                  <article class="party-card" data-id="">
                    <header class="party-header">
                      <h4 class="party-name">Party Name</h4>
                      <div class="party-actions">
                        <button class="icon-btn edit-btn" aria-label="Edit party" title="Edit">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <path
                              d="M3 21v-3.75L14.06 6.19l3.75 3.75L6.75 21H3z"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                            <path
                              d="M18.37 5.63l.0001-.0001a2 2 0 0 0 0-2.83 2 2 0 0 0-2.83 0L14 4.32"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                          </svg>
                        </button>

                        <button class="icon-btn delete-btn" aria-label="Delete party" title="Delete">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                              d="M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                          </svg>
                        </button>

                        <button class="icon-btn details-btn" aria-expanded="false" aria-label="Show details" title="Details">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                          </svg>
                        </button>
                      </div>
                    </header>

                    <div class="party-body">
                      <div class="info-box">
                        <div class="info-value">Datum</div>
                        <div class="info-label">Datum</div>
                      </div>
                      <div class="info-box">
                        <div class="info-value">Uhrzeit</div>
                        <div class="info-label">Uhrzeit</div>
                      </div>
                      <div class="info-box">
                        <div class="info-value">Ort</div>
                        <div class="info-label">Ort</div>
                      </div>
                    </div>

                    <div class="party-extra hidden" aria-hidden="true">
                      <pre class="party-json" tabindex="0"></pre>
                    </div>
                  </article>
                </template>

                <div id="partiesContainer" class="party-grid" aria-live="polite"></div>
              </section>

              <section id="tabContentPosts" class="tab-section" style="display:block;">
                <p class="muted no-posts">Keine Beiträge vorhanden</p>

                <template id="post-template">
                  <article class="post-card" data-id="">
                    <header class="post-header">
                      <h4 class="post-title">Beitragstitel</h4>
                      <div class="post-actions">
                        <button class="icon-btn edit-btn" aria-label="Edit post" title="Edit">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <path
                              d="M3 21v-3.75L14.06 6.19l3.75 3.75L6.75 21H3z"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                            <path
                              d="M18.37 5.63l.0001-.0001a2 2 0 0 0 0-2.83 2 2 0 0 0-2.83 0L14 4.32"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                          </svg>
                        </button>

                        <button class="icon-btn delete-btn" aria-label="Delete post" title="Delete">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                              d="M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                          </svg>
                        </button>
                      </div>
                    </header>

                    <div class="post-body">
                      <div class="content-placeholder">Inhalt des Beitrags</div>
                    </div>
                  </article>
                </template>
              </section>

              <section id="tabContentFavorites" class="tab-section" style="display:none;">
                <p class="muted no-favorites">Keine Favoriten vorhanden</p>

                <template id="favorite-template">
                  <article class="favorite-card" data-id="">
                    <header class="favorite-header">
                      <h4 class="favorite-title">Favoriten Titel</h4>
                      <div class="favorite-actions">
                        <button class="icon-btn delete-btn" aria-label="Remove from favorites" title="Remove">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <path d="M3 6h18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                              d="M8 6v12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V6"
                              stroke="currentColor"
                              stroke-width="1.4"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                            />
                            <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
                          </svg>
                        </button>
                      </div>
                    </header>

                    <div class="favorite-body">
                      <div class="content-placeholder">Inhalt des Favoriten</div>
                    </div>
                  </article>
                </template>
              </section>
            </div>
          </div>
        </div>
      </main>

      <nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
        <a class="nav-btn" href="/index.html" aria-label="Home">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3 6.5L8 4l7 2.5 6-2.5v11l-6 2.5L10 15 3 17.5v-11z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
              stroke-linecap="round"
            />
          </svg>
          <span class="nav-label">Home</span>
        </a>

        <a class="nav-btn" href="/listPartys/listPartys.html" aria-label="Partys">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.6" />
            <circle cx="8.5" cy="8.5" r="1.8" fill="currentColor" />
            <path
              d="M21 21l-6-6-5 5"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Partys</span>
        </a>

        <a class="nav-btn" href="/notifications/notifications.html" aria-label="Inbox">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22a2.5 2.5 0 0 0 2.45-2H9.55A2.5 2.5 0 0 0 12 22z" fill="currentColor" />
            <path
              d="M18 8a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2V8z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Inbox</span>
        </a>

        <a class="nav-btn active" href="/profile/profile.html" aria-label="Profil" aria-current="page">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8.5" r="3" stroke="currentColor" stroke-width="1.6" />
            <path
              d="M4 20a8 8 0 0 1 16 0"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="nav-label">Profil</span>
        </a>
      </nav>
    </div>
  </body>
</html>
