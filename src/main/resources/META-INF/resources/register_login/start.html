<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PartyHub</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1040" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyHub" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      .page {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        background: var(--bg-primary);
        position: relative;
        overflow: hidden;
      }

      .page::before {
        content: '';
        position: absolute;
        top: -30%;
        right: -20%;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
        pointer-events: none;
      }

      .page::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -20%;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(86,242,124,0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      .start-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-soft);
        border-radius: 24px;
        padding: 56px 40px;
        box-shadow: var(--shadow-soft);
        max-width: 480px;
        width: 100%;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .start-card h1 {
        font-family: var(--font-display);
        font-size: 48px;
        color: var(--text-primary);
        margin: 0 0 8px 0;
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      .start-card .tagline {
        color: var(--text-secondary);
        font-size: 17px;
        margin: 0 0 40px 0;
        line-height: 1.5;
        font-family: var(--font-family);
      }

      .button-group {
        display: flex;
        gap: 12px;
        flex-direction: column;
      }

      .btn {
        padding: 15px 32px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-block;
        font-family: var(--font-family);
      }

      .btn-primary {
        background: var(--accent-color);
        color: white;
        box-shadow: 0 4px 20px rgba(255, 46, 99, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(255, 46, 99, 0.5);
      }

      .btn-primary:active {
        transform: translateY(0);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-primary);
        border: 1px solid var(--border-soft);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .features {
        margin-top: 48px;
        text-align: left;
        padding-top: 28px;
        border-top: 1px solid var(--border-soft);
      }

      .features h3 {
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 20px;
        font-family: var(--font-family);
      }

      .feature-item {
        display: flex;
        margin-bottom: 16px;
        align-items: flex-start;
        gap: 14px;
      }

      .feature-item:last-child {
        margin-bottom: 0;
      }

      .feature-icon {
        width: 22px;
        height: 22px;
        color: var(--accent-color);
        flex-shrink: 0;
        margin-top: 2px;
      }

      .feature-item p {
        margin: 0;
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.5;
        font-family: var(--font-family);
      }

      @media (max-width: 480px) {
        .start-card {
          padding: 40px 24px;
          border-radius: 20px;
        }

        .start-card h1 {
          font-size: 36px;
        }

        .start-card .tagline {
          font-size: 15px;
        }
      }
    </style>
    <script src="../user-utils.js" defer></script>
    <script src="../auth-service.js" defer></script>
    <script src="../route-guard.js" defer></script>
  </head>
  <body>
    <div class="page">
      <div class="start-card">
        <h1>PartyHub</h1>
        <p class="tagline">Discover and share amazing parties and events in your area</p>

        <div class="button-group">
          <button class="btn btn-primary" id="loginBtn">
            Log In
          </button>
          <button class="btn btn-primary" id="registerBtn" style="background: linear-gradient(135deg, var(--accent-color) 0%, #ff6b3d 100%); box-shadow: 0 4px 20px rgba(255, 46, 99, 0.35);">
            Create Account
          </button>
          <button class="btn btn-secondary" id="exploreBtn">
            Explore as Guest
          </button>
        </div>

        <div class="features">
          <h3>Why join PartyHub?</h3>
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
            <p>Discover trending parties and events near you</p>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <p>Connect with people and make new friends</p>
          </div>
          <div class="feature-item">
            <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <p>Manage your profile and party invitations</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (window.authService && window.authService.isLoggedIn()) {
          window.location.href = '/index.html';
          return;
        }

        const exploreBtn = document.getElementById('exploreBtn');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        loginBtn.addEventListener('click', async function() {
          await window.authService.login({ redirectTo: '/index.html' });
        });

        registerBtn.addEventListener('click', async function() {
          await window.authService.register({ redirectTo: '/index.html' });
        });

        exploreBtn.addEventListener('click', function() {
          window.location.href = '/index.html';
        });
      });
    </script>
  </body>
</html>
