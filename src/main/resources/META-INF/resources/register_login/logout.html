<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing out - PartyHub</title>
    <link rel="stylesheet" href="../global.css" />
    <script src="../user-utils.js" defer></script>
    <script src="../auth-service.js" defer></script>
  </head>
  <body>
    <main style="min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center;">
      <div>
        <h1>Signing out</h1>
        <p>PartyHub is ending your login session.</p>
      </div>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        if (!window.authService?.logout) {
          window.location.replace("/register_login/start.html");
          return;
        }

        await window.authService.init();
        window.authService.logout();
      });
    </script>
  </body>
</html>
