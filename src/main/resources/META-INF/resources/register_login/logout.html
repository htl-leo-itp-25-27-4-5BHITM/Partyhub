<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing out - PartyHub</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1040" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyHub" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="stylesheet" href="../global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background: var(--bg-primary);
        font-family: var(--font-family);
      }

      .logout-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        background: var(--bg-primary);
      }

      .logout-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-soft);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: var(--shadow-soft);
        max-width: 400px;
        width: 100%;
      }

      .logout-card h1 {
        font-family: var(--font-display);
        font-size: 28px;
        color: var(--text-primary);
        margin: 0 0 12px 0;
        font-weight: 400;
      }

      .logout-card p {
        color: var(--text-secondary);
        font-size: 16px;
        margin: 0;
        line-height: 1.5;
        font-family: var(--font-family);
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 24px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 480px) {
        .logout-card {
          padding: 36px 24px;
          border-radius: 20px;
        }

        .logout-card h1 {
          font-size: 24px;
        }
      }
    </style>
    <script src="../user-utils.js" defer></script>
    <script src="../auth-service.js" defer></script>
  </head>
  <body>
    <main class="logout-page">
      <div class="logout-card">
        <div class="spinner"></div>
        <h1>Signing out</h1>
        <p>PartyHub is ending your login session.</p>
      </div>
    </main>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        if (!window.authService?.logout) {
          window.location.replace("/register_login/start.html");
          return;
        }

        await window.authService.init();
        window.authService.logout();
      });
    </script>
  </body>
</html>
