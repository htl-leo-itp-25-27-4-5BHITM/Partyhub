<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PartyHub</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1040" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PartyHub" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="stylesheet" href="../../global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .page::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,46,99,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: var(--shadow-soft);
            max-width: 400px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-family: var(--font-display);
            font-size: 36px;
            color: var(--text-primary);
            margin: 0 0 8px 0;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 16px;
            margin: 0;
            font-family: var(--font-family);
        }

        .error-message {
            background: rgba(255, 46, 99, 0.14);
            border: 1px solid rgba(255, 46, 99, 0.25);
            color: #ffd2e1;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: rgba(86, 242, 124, 0.14);
            border: 1px solid rgba(86, 242, 124, 0.25);
            color: #b8fcc9;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            font-family: var(--font-family);
            box-shadow: 0 4px 20px rgba(255, 46, 99, 0.35);
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 46, 99, 0.5);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 24px 0 16px;
            color: var(--text-muted);
            font-size: 14px;
            font-family: var(--font-family);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border-soft);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .signup-link {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-family: var(--font-family);
        }

        .signup-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .signup-link a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .demo-credentials {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-soft);
            padding: 16px;
            border-radius: 14px;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-family: var(--font-family);
        }

        .demo-credentials h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .demo-credentials p {
            margin: 4px 0;
        }

        .loading {
            display: inline-block;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="login-card">
            <div class="login-header">
                <h1>PartyHub</h1>
                <p>Welcome back</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm">
                <button type="submit" class="btn-login" id="loginBtn">
                    Continue with Keycloak
                </button>
            </form>

            <div class="demo-credentials" id="demoCredentials">
                <h3>Local Demo Credentials:</h3>
                <p><strong>Username:</strong> viki_dji</p>
                <p><strong>Password:</strong> partyhub</p>
            </div>

            <div class="divider">or</div>

            <div class="signup-link">
                Don't have an account? <a href="#" id="registerLink">Register here</a>
            </div>
        </div>
    </div>

    <script src="../../user-utils.js" defer></script>
    <script src="../../auth-service.js" defer></script>
    <script src="../../route-guard.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.authService && window.authService.isLoggedIn()) {
                window.location.href = '/index.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const registerLink = document.getElementById('registerLink');
            const demoCredentials = document.getElementById('demoCredentials');

            // Hide demo credentials for OIDC auth (only show direct auth)
            if (demoCredentials && !/localhost|127\.0\.0\.1/.test(window.location.hostname)) {
                demoCredentials.style.display = 'none';
            }

            registerLink.addEventListener('click', async function(e) {
                e.preventDefault();
                try {
                    await window.authService.register({ redirectTo: '/index.html' });
                } catch (err) {
                    console.error('Register error:', err);
                }
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                loginBtn.disabled = true;
                loginBtn.textContent = 'Redirecting...';
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';

                try {
                    await window.authService.login({ redirectTo: '/index.html' });
                } catch (err) {
                    console.error('Login error:', err);
                    const message = err.message || 'Login failed. Please try again.';
                    showError(message);
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Continue with Keycloak';
                }
            });

            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
            }

            function showSuccess(message) {
                successMsg.textContent = message;
                successMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
