<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Login - PartyHub</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1040" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PartyHub" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="stylesheet" href="../global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: var(--bg-primary);
      font-family: var(--font-family);
      margin: 0;
    }

    .qr-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    .qr-page::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(62,193,243,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .qr-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow-soft);
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .qr-card h2 {
      font-family: var(--font-display);
      font-size: 24px;
      color: var(--text-primary);
      margin: 0 0 24px 0;
      font-weight: 400;
    }

    .qr-image-wrap {
      background: white;
      padding: 16px;
      border-radius: 16px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .qr-image-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #info {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
      margin: 0;
      font-family: var(--font-family);
    }

    @media (max-width: 480px) {
      .qr-card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .qr-card h2 {
        font-size: 20px;
      }
    }
  </style>
  <script src="../auth-service.js" defer></script>
  <script>
    async function generate() {
      try {
        if (!window.authService || !window.authService.apiCall) {
          document.getElementById('info').textContent = 'Auth service not available. Please ensure you are on the authenticated site.';
          return;
        }

        const res = await window.authService.apiCall('/api/qr/generate');
        if (!res.ok) {
          if (res.status === 401) {
            document.getElementById('info').textContent = 'Please log in to generate a QR.';
          } else {
            document.getElementById('info').textContent = 'Could not generate QR. Try again later.';
          }
          return;
        }

        const data = await res.json();
        const payload = encodeURIComponent(data.payload);
        const token = data.token;
        const imageUrl = data.imageUrl || `https://chart.googleapis.com/chart?cht=qr&chs=300x300&chl=${payload}`;
        document.getElementById('qrImg').src = imageUrl;
        document.getElementById('info').textContent = 'Open the PartyHub mobile app and scan or tap the QR.';

        const infoEl = document.getElementById('info');
        let polling = true;
        async function poll() {
          if (!polling) return;
          try {
          const statusRes = await window.authService.apiCall(`/api/qr/status/${encodeURIComponent(token)}`);
            if (!statusRes.ok) {
              polling = false;
              return;
            }
            const status = await statusRes.json();
            if (status.used) {
              infoEl.textContent = 'QR scanned. Logging in on mobile...';
              polling = false;
              return;
            }
            if (status.expiresAt) {
              const expires = new Date(status.expiresAt);
              const now = new Date();
              const secs = Math.max(0, Math.floor((expires - now) / 1000));
              infoEl.textContent = `Expires in ${secs}s. Open mobile app and scan.`;
              if (secs <= 0) {
                polling = false;
                infoEl.textContent = 'QR expired. Please refresh to generate a new one.';
                return;
              }
            }
          } catch (e) {
            polling = false;
            console.error('Polling error', e);
          }
          if (polling) setTimeout(poll, 2000);
        }
        setTimeout(poll, 2000);
      } catch (e) {
        console.error('generate error', e);
        document.getElementById('info').textContent = 'Please log in to generate a QR.';
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', generate);
    } else {
      setTimeout(generate, 50);
    }
  </script>
</head>
<body>
  <div class="qr-page">
    <div class="qr-card">
      <h2>Scan this QR with the PartyHub app</h2>
      <div class="qr-image-wrap">
        <img id="qrImg" alt="QR code" width="300" height="300" />
      </div>
      <p id="info"></p>
    </div>
  </div>
</body>
</html>
